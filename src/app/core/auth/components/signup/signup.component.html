<div class="signup-container">
  <!-- Header -->
  <header class="signup-header">
    <div class="logo">StreamBit</div>
    <button class="sign-in-btn">Sign In</button>
  </header>

  <!-- Main Content -->
  <main class="signup-main">
    <!-- Step Indicator -->
    <div class="step-indicator">
      <span class="step-number">Step 1 of 3</span>
    </div>

    <!-- Device Icons -->
    <div class="device-icons">
      <svg class="icon laptop" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="3" width="20" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6 17h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 20h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <svg class="icon desktop" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6 16h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 20h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <svg class="icon mobile" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="2" width="12" height="20" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </svg>
    </div>

    <!-- Content -->
    <div class="content">
      <h1 class="heading">Finish setting up your account</h1>
      <p class="description">
        We'll send a sign-up link to <strong>{{ userEmail }}</strong> so you can use StreamBit without a password on any device at any time.
      </p>
    </div>

    <!-- Action Button -->
    <button class="send-link-btn" (click)="onSendLink()">Send Link</button>
  </main>

  <!-- Footer -->
  <footer class="signup-footer">
    <div class="footer-content">
      <p class="footer-question">Questions? Call 01 800 519 1570 (Toll-Free)</p>
      <div class="footer-links">
        <a href="#">FAQ</a>
        <a href="#">Help Center</a>
        <a href="#">Terms of Use</a>
        <a href="#">Privacy</a>
        <a href="#">Cookie Preferences</a>
        <a href="#">Corporate Information</a>
      </div>
      <div class="language-selector">
        <select>
          <option>English</option>
          <option>Español</option>
          <option>Português</option>
        </select>
      </div>
    </div>
  </footer>
</div>
