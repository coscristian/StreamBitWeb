<main class="auth-container">
  <section class="auth-container__auth-card">
    <div class="auth-container__card-content">
      <div class="auth-container__auth-title">
        <h1>Create Account</h1>
        <p>Join us for the latest in sports, movies and events!</p>
      </div>
      <form class="auth-container__form">
        <input type="text" pInputText  />
        <input type="text" pInputText />
        <div class="auth-container__terms">
          <p-checkbox [binary]="true" />
          <p>I agree with Terms & Conditions</p>
        </div>
        <p-button label="Sign Up" type="submit"/>
      </form>
      <hr>
      <div class="auth-container__social">
        <p-button label="Continue with Apple" type="submit"/>
        <p-button label="Continue with Google" type="submit"/>
        <p-button label="Continue with Facebook" type="submit"/>
      </div>
      <p class="auth-container__registered">Already registered? <a href="#">Log in</a></p>
    </div>
  </section>
</main>
